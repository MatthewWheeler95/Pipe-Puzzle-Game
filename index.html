<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A puzzle game where you connect pipes to power all tiles">
    <meta name="theme-color" content="#667eea">
    <title>Pipe Connection Puzzle</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pipe Puzzle">
</head>
<body>
    <div class="container">
        <h1>Pipe Connection Puzzle</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="gridSize">Grid Size:</label>
                <input type="range" id="gridSize" min="4" max="30" value="8" step="1">
                <span id="gridSizeValue">8x8</span>
            </div>
            
            <div class="control-group">
                <label for="tileSize">Tile Size:</label>
                <select id="tileSize">
                    <option value="auto">Auto</option>
                    <option value="20">20px</option>
                    <option value="30">30px</option>
                    <option value="40">40px</option>
                    <option value="50">50px</option>
                    <option value="60" selected>60px</option>
                    <option value="70">70px</option>
                    <option value="80">80px</option>
                    <option value="90">90px</option>
                    <option value="100">100px</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="hideUnpowered">
                    Hide Unpowered Tiles
                </label>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="wrapEdges">
                    Wrap Edges
                </label>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="extraLoops">
                    Extra Loops
                </label>
            </div>
            
            <div class="control-group">
                <button id="newGame">New Game</button>
            </div>
            
            <div class="stats">
                <span>Moves: <span id="moveCount">0</span></span>
                <span>Best: <span id="bestScore">-</span></span>
                <span>Powered: <span id="poweredCount">0</span>/<span id="totalCount">0</span></span>
            </div>
        </div>
        
        <div id="winMessage" class="win-message hidden">
            <h2>🎉 You Won! 🎉</h2>
            <p>All tiles are powered!</p>
            <p>Moves: <span id="finalMoves">0</span></p>
        </div>
        
        <div id="gameBoard"></div>
    </div>
    
    <script src="game.js"></script>
    <script>
        // Register service worker for offline functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
